short_bio: >-
  <p>
    I am a Lecturer in the School of Information and Communication Technology at Griffith University. 
    I received my PhD from the University of New South Wales (UNSW) in 2019 and was a Research Fellow at UNSW before joining Griffith in 2023.
  </p>
  <p>
    My research focuses on biomedical AI and computer vision, with particular interests in multimodal biomedical intelligence,
    3D/4D vision, predictive spatiotemporal modelling, neuroimaging and brain-signal analysis, computational pathology, cellular imaging and 
    molecular profiling, surgical robotics, and trustworthy AI for healthcare. My work aims to transform complex biomedical and real-world data 
    into actionable intelligence, supporting biomedical discovery, disease understanding, precision healthcare, and intelligent robotic assistance.
  </p>
  <p>
    I have published in leading venues including Nature Methods, IEEE TPAMI, IEEE TMI, and CVPR, among others. 
    I received the Australian Pattern Recognition Society Early Career Research Award in 2023 and currently co-lead 
    the <a href="https://ai4healthlab.github.io/" target="_blank">AI4Health Lab</a>.
  </p>
